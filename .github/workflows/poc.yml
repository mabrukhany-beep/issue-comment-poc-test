name: issue-comment-poc
on:
  issue_comment:
    types: [created]

jobs:
  poc:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    
    steps:
      - name: Show event info
        run: |
          echo "=== EVENT INFO ==="
          echo "Event name: ${{ github.event_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Actor: ${{ github.actor }}"
          echo "Issue number: ${{ github.event.issue.number }}"
          echo "Comment body: ${{ github.event.comment.body }}"
          echo "Author association: ${{ github.event.comment.author_association }}"
          echo ""
          echo "=== TOKEN INFO ==="
          echo "GITHUB_TOKEN available: ${{ secrets.GITHUB_TOKEN != '' }}"
          echo "TOKEN length: ${#TOKEN}"
          echo ""
          echo "=== PERMISSIONS ==="
          echo "Contents: write"
          echo "Pull requests: write"
          echo "Issues: write"
      
      - name: Show token permissions (safe)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== TOKEN PERMISSIONS ==="
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }} \
            | jq -r '.permissions'
      
      - name: Demonstrate write access (add comment to PR)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== DEMONSTRATING WRITE ACCESS ==="
          curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{"body":"🤖 This comment was added by the issue_comment workflow to demonstrate write access!"}' \
            https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments
